<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leia SP Cloud Bot</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0e14;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background-color: #151a24;
            padding: 40px 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            box-sizing: border-box;
        }
        h2 {
            color: #ffffff;
            font-size: 24px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .input-group {
            margin-bottom: 15px;
            width: 100%;
        }
        input, select {
            width: 100%;
            padding: 14px;
            background-color: #1f2633;
            border: 1px solid #2d3748;
            border-radius: 6px;
            color: #ffffff;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
            appearance: none; /* Remove seta padrão em alguns sistemas */
            -webkit-appearance: none;
        }
        input:focus, select:focus {
            border-color: #e53e3e;
        }
        input::placeholder {
            color: #4a5568;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #e53e3e;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
            box-sizing: border-box;
        }
        button:hover {
            background-color: #c53030;
        }
        .status {
            color: #718096;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Leia SP Cloud Bot 🚀</h2>
        
        <div class="input-group">
            <input type="text" id="ra" placeholder="Digite o RA">
        </div>
        
        <div class="input-group">
            <input type="text" id="digito" placeholder="Dígito do RA">
        </div>

        <div class="input-group">
            <select id="estado">
                <option value="sp" selected>São Paulo (SP)</option>
                <option value="ac">Acre (AC)</option>
                <option value="al">Alagoas (AL)</option>
                <option value="ap">Amapá (AP)</option>
                <option value="am">Amazonas (AM)</option>
                <option value="ba">Bahia (BA)</option>
                <option value="ce">Ceará (CE)</option>
                <option value="df">Distrito Federal (DF)</option>
                <option value="es">Espírito Santo (ES)</option>
                <option value="go">Goiás (GO)</option>
                <option value="ma">Maranhão (MA)</option>
                <option value="mt">Mato Grosso (MT)</option>
                <option value="ms">Mato Grosso do Sul (MS)</option>
                <option value="mg">Minas Gerais (MG)</option>
                <option value="pa">Pará (PA)</option>
                <option value="pb">Paraíba (PB)</option>
                <option value="pr">Paraná (PR)</option>
                <option value="pe">Pernambuco (PE)</option>
                <option value="pi">Piauí (PI)</option>
                <option value="rj">Rio de Janeiro (RJ)</option>
                <option value="rn">Rio Grande do Norte (RN)</option>
                <option value="rs">Rio Grande do Sul (RS)</option>
                <option value="ro">Rondônia (RO)</option>
                <option value="rr">Roraima (RR)</option>
                <option value="sc">Santa Catarina (SC)</option>
                <option value="se">Sergipe (SE)</option>
                <option value="to">Tocantins (TO)</option>
            </select>
        </div>

        <div class="input-group">
            <input type="password" id="senha" placeholder="Digite a Senha">
        </div>

        <button id="btnIniciar">Iniciar Leituras</button>
        
        <div class="status" id="statusTxt">Pronto para iniciar...</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
